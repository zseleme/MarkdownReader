name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - master
      - develop

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Gerar version.json
        run: |
          cat > version.json <<EOF
          {
            "version": "$(date +%Y.%m.%d-%H%M%S)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployed_by": "${{ github.actor }}"
          }
          EOF
          echo "version.json gerado:"
          cat version.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=mdreader --branch=${{ github.ref_name }}

      - name: Resumo do Deploy
        if: success()
        run: |
          echo "Deploy concluido com sucesso!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: $(git log -1 --pretty=format:'%h - %s')"
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "URL: https://mdreader.pages.dev"
          else
            echo "URL: https://${{ github.ref_name }}.mdreader.pages.dev"
          fi
